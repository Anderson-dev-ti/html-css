<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 4</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;

        }
        th, td {
            border: 1px solid black;
            padding: 15px;
            width: 100px;
        }
        td {
            text-align: center ;
        }

        #left, #left1 {
            text-align: left;
        }

        .fundogray  {
            background-color: rgba(128, 128, 128, 0.602);
            color: white;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" class="fundogray">Área</th>
                <th rowspan="2" class="fundogray" scope="col">Disciplinas</th>
                <th colspan="2" class="fundogray" scope="colgroup">Notas</th>
                <th rowspan="2" class="fundogray" scope="col">Média</th>
            </tr>
            <tr>
                <th class="fundogray">Nota 1</th>
                <th class="fundogray">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td scope="row">Matemática</td>
                <td>10.0</td>
                <td>10.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td scope="row">Física</td>
                <td>10.0</td>
                <td>10.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td scope="row">Química</td>
                <td>10.0</td>
                <td>10.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <td scope="row">Biologia</td>
                <td>10.0</td>
                <td>10.0</td>
                <td>10.0</td>
            </tr>
            <tr>
                <th scope="row" colspan="4" class="fundogray" id="left">Média de Exatas</th>
                <th class="fundogray">10.0</th>
            </tr>
            <tr>
                <th scope="rowgroup" rowspan="2">Humanas</th>
                <td scope="row">História</td>
                <td>9.0</td>
                <td>9.0</td>
                <td>9.0</td>
            </tr>
            <tr>
                <td scope="row">Geografia</td>
                <td>9.0</td>
                <td>9.0</td>
                <td>9.0</td>
            </tr>
            <tr>
                <th scope="row" class="fundogray" id="left1" colspan="4">Média de Humanas</th>
                <th class="fundogray" class="left">9.0</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
