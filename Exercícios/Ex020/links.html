<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {font-family: Arial, Helvetica, sans-serif;}
        a { color: red; text-decoration: none; }
        a:visited {color: blue; font-weight: bold;}
        a:hover {text-decoration: underline; font-weight: bold;}
        a:active {color: yellow;}
        a::after {content: ' [Link]'; color: black;}




    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io/" rel="external" target="_blank">Repositório do GitHub</a></li>
        <li><a href="https://www.youtube.com/@CursoemVideo" rel="external" target="_blank">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com/" rel="external" target="_blank">Site do Curso de Vídeo</a></li> 
        



        
    </ul>
</body>
</html>
