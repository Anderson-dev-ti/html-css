<!DOCTYPE html>
<html lang="pt-br ">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
<h1>Imagem Dinâmica</h1>
<p>Tente abrir esse site em vários dispositivos ou simplesmente aumente e diminua o tamanho do seu navegador. </p>
<picture>
    <source media="(max-width: 750px)" srcset="Imagens/foto-p.png">
 <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png">
    <img src="Imagens/foto-g.png" alt="Imagem flexível">
</picture>
<h1>Reproduzindo Áudio</h1>
<p>Vamos aprender a reproduzir áudios em HTML5</p>
<audio preload="metadata" autoplay controls loop >
<source src="midias/no-mercy.mp3" type="audio/mpeg">
<source src="midias/no-mercy.ogg" type="audio/ogg">
<source src="midias/no-mercy.wav" type="audio/wav">
<p>Infelizmente seu navegador não consegue reproduzir áudio, <a href="midias/no-mercy.mp3">clique aqui para baixar o arquivo mp3.</a></p>
<p>Que merda é essa</p>
</audio>
</body>
</html>
